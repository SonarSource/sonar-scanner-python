name: sonar-release
# This workflow is triggered when publishing a new GitHub release
on:
  release:
    types:
      - published

jobs:
  prerelease:
    if: "github.event.release.prerelease"
    permissions:
      id-token: write
      contents: write
    uses: SonarSource/gh-action_release/.github/workflows/main.yaml@1100202a84d61bb9aab08f9e623e42e9d769f010 # 6.2.4
    with:
      publishToTestPyPI: true
      skipPythonReleasabilityChecks: true
  release:
    if: "!github.event.release.prerelease"
    permissions:
      id-token: write
      contents: write
    uses: SonarSource/gh-action_release/.github/workflows/main.yaml@1100202a84d61bb9aab08f9e623e42e9d769f010 # 6.2.4
    with:
      publishToPyPI: true
      skipPythonReleasabilityChecks: true
