name: sonar-release
# This workflow is triggered when publishing a new GitHub release
on:
  release:
    types:
      - published

jobs:
  prerelease:
    if: "github.event.release.prerelease"
    permissions:
      id-token: write
      contents: write
    uses: SonarSource/gh-action_release/.github/workflows/main.yaml@7b4688d4d6056139268fc5801f08a9ec1a2cb5d9 # 5.15.0
    with:
      publishToTestPyPI: true
      skipPythonReleasabilityChecks: true
  release:
    if: "!github.event.release.prerelease"
    permissions:
      id-token: write
      contents: write
    uses: SonarSource/gh-action_release/.github/workflows/main.yaml@7b4688d4d6056139268fc5801f08a9ec1a2cb5d9 # 5.15.0
    with:
      publishToPyPI: true
      skipPythonReleasabilityChecks: true
